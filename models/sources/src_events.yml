version: 2

sources:
  - name: raw
    database: "{{ env_var('GCP_PROJECT', target.database) }}"
    schema: "{{ env_var('BQ_DATASET', target.schema) }}"
    tables:
      - name: events
        description: Raw event stream loaded from CSV.
        config:
          loaded_at_field: loaded_at
        columns:
          - name: event_time
            tests:
              - not_null
          - name: user_id
            tests:
              - not_null
