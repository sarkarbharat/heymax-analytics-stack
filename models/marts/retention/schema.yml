version: 2

models:
  - name: fct_cohort_retention_triangle
    description: Segmented retention triangle for cohort heatmaps by period index.
    columns:
      - name: cohort_grain
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['daily', 'weekly', 'monthly']
                quote: true
      - name: cohort_start
        tests:
          - not_null
      - name: period_index
        tests:
          - not_null
      - name: country
        tests:
          - not_null
      - name: platform
        tests:
          - not_null
      - name: utm_source
        tests:
          - not_null
      - name: cohort_users
        tests:
          - not_null
      - name: retained_users
        tests:
          - not_null
      - name: retention_rate
        tests:
          - not_null
